# Remap prefix from Ctrl+b to Ctrl+a
unbind C-b
set -g prefix C-a

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -sg terminal-overrides ",*:RGB"  # true color support
set -g mouse on
set -g renumber-windows on  # keep numbering sequential
setw -g automatic-rename on
set -g status-position top

# Display Popups
bind t display-popup \
  -d "#{pane_current_path}" \
  -w 75% \
  -h 75% \
  -E "zsh"
bind f display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"
bind z display-popup \
  -w 80% \
  -h 80% \
  -E 'nvim ~/.zshrc'
bind r source-file ~/.config/tmux/tmux.conf \; run-shell 'for pane in $(tmux list-panes -a -F "#{session_name}:#{window_index}.#{pane_index}:#{pane_current_command}"); do cmd="${pane##*:}"; target="${pane%:*}"; if [ "$cmd" = "zsh" ] || [ "$cmd" = "bash" ]; then tmux send-keys -t "$target" "source ~/.zshrc && source ~/.zshenv" Enter; fi; done' \; display "Config reloaded!"
bind c new-window -c "#{HOME}"
bind C-n display-popup -E 'bash -i -c "read -p \"Session name: \" name; tmux new-session -d -s \$name -c \$HOME && tmux switch-client -t \$name"'
bind C-p display-popup -E "ipython"
bind C-a display-popup \
  -w 60% \
  -h 60% \
  -E "aichat"


# Copy - Paste
set -g set-clipboard on
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'Nybkox/tmux-lazygit'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Catppuccin
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

# Must be at the end
run '~/.tmux/plugins/tpm/tpm'

# Status line - after TPM loads plugins
set -g status-left ""
set -g @catppuccin_date_time_text " %H:%M"
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_date_time}"
